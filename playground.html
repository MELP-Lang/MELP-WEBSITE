<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>MELP Playground</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#1e1e2e;color:#cdd6f4;height:100vh;display:flex;flex-direction:column}
header{background:#181825;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #313244;flex-wrap:wrap;gap:8px}
header h1{font-size:16px;font-weight:600;color:#cba6f7;white-space:nowrap}
header h1 span{color:#a6e3a1;font-weight:400}
.toolbar{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.btn{padding:6px 14px;border:none;border-radius:5px;cursor:pointer;font-size:13px;font-weight:600;transition:all .2s;white-space:nowrap}
.btn-run{background:#a6e3a1;color:#1e1e2e}
.btn-run:hover{background:#94e2a1}
.btn-run:disabled{background:#585b70;color:#cdd6f4;cursor:not-allowed}
.btn-clear{background:#45475a;color:#cdd6f4}
.btn-clear:hover{background:#585b70}
.sel{background:#313244;color:#cdd6f4;border:1px solid #45475a;border-radius:5px;padding:6px 8px;font-size:12px;cursor:pointer}
main{display:flex;flex:1;overflow:hidden;flex-direction:row}
@media(max-width:700px){main{flex-direction:column}}
.editor-panel{flex:1;display:flex;flex-direction:column;border-right:1px solid #313244;min-height:200px}
@media(max-width:700px){.editor-panel{border-right:none;border-bottom:1px solid #313244}}
.editor-panel label{font-size:11px;color:#a6adc8;padding:6px 12px;background:#181825;display:flex;justify-content:space-between}
#editor{flex:1;background:#1e1e2e;color:#cdd6f4;border:none;padding:12px;font-family:'JetBrains Mono','Fira Code',monospace;font-size:13px;line-height:1.5;resize:none;outline:none;tab-size:4}
.output-panel{flex:1;display:flex;flex-direction:column;min-height:150px}
.output-panel label{font-size:11px;color:#a6adc8;padding:6px 12px;background:#181825;display:flex;justify-content:space-between}
#output{flex:1;background:#11111b;color:#cdd6f4;padding:12px;font-family:'JetBrains Mono','Fira Code',monospace;font-size:12px;line-height:1.4;overflow:auto;white-space:pre-wrap;word-break:break-all}
.error{color:#f38ba8}
.success{color:#a6e3a1}
.warn{color:#f9e2af}
footer{background:#181825;padding:6px 14px;font-size:11px;color:#585b70;text-align:center;border-top:1px solid #313244}
footer a{color:#cba6f7;text-decoration:none}
</style>
</head>
<body>
<header>
    <h1>MELP <span>Playground</span></h1>
    <div class="toolbar">
        <select class="sel" id="exampleSelect" onchange="loadExample()">
            <option value="">📚 Ornekler...</option>
        </select>
        <button class="btn btn-clear" onclick="clearOutput()">Temizle</button>
        <button class="btn btn-run" id="btnRun" onclick="runCode()">▶ Calistir</button>
    </div>
</header>
<main>
    <div class="editor-panel">
        <label>📝 MELP Kodu <span id="lineCount"></span></label>
        <textarea id="editor" spellcheck="false">function main()
    println("Merhaba MELP!")
end function</textarea>
    </div>
    <div class="output-panel">
        <label>📤 Cikti <span id="status"></span></label>
        <div id="output"></div>
    </div>
</main>
<footer>Ctrl+Enter = Calistir · <a href="https://github.com/MELP-Lang/MELP" target="_blank">GitHub</a> · STAGE10 · WASM ✨</footer>

<script>
const editor=document.getElementById('editor');
const output=document.getElementById('output');
const btnRun=document.getElementById('btnRun');
const status=document.getElementById('status');
const exampleSelect=document.getElementById('exampleSelect');
const lineCount=document.getElementById('lineCount');

// WASM Worker — tarayici ici derleme
let worker = null;
let workerReady = false;

// Embedded examples
const examples = [
    {title:"01 — Merhaba Dunya", code:"-- Ornek 1: Merhaba Dunya\nfunction main()\n    println(\"Merhaba MELP!\")\nend function\n"},
    {title:"02 — Degiskenler ve Aritmetik", code:"-- Ornek 2: Degiskenler ve Aritmetik\nfunction main()\n    numeric a = 10\n    numeric b = 20\n    numeric c = a + b\n    println(str(c))\nend function\n"},
    {title:"03 — String Birlestirme", code:"-- Ornek 3: String Birlestirme\nfunction main()\n    string selam = \"Merhaba\"\n    string isim = \"MELP\"\n    string mesaj = selam & \" \" & isim & \"!\"\n    println(mesaj)\nend function\n"},
    {title:"04 — Dongu", code:"-- Ornek 4: Dongu\nfunction main()\n    numeric i = 0\n    loop i < 5\n        println(\"Sayi: \" & str(i))\n        i = i + 1\n    end loop\nend function\n"},
    {title:"05 — Kosul", code:"-- Ornek 5: Kosul\nfunction main()\n    numeric yas = 18\n    if yas >= 18 then\n        println(\"Yetiskin\")\n    else\n        println(\"Cocuk\")\n    end if\nend function\n"},
    {title:"06 — Struct", code:"-- Ornek 6: Struct\nstruct Nokta\n    numeric x\n    numeric y\nend struct\n\nfunction main()\n    Nokta p\n    p.x = 10\n    p.y = 20\n    println(\"x=\" & str(p.x) & \" y=\" & str(p.y))\nend function\n"},
    {title:"07 — Fonksiyon", code:"-- Ornek 7: Fonksiyon\nnumeric function kare(numeric x)\n    return x * x\nend function\n\nfunction main()\n    numeric sonuc = kare(7)\n    println(\"7^2 = \" & str(sonuc))\nend function\n"},
    {title:"08 — HTTP (curl)", code:"-- Ornek 8: HTTP Istegi (curl gerekir)\nfunction main()\n    println(\"Web'den veri cekiliyor...\")\n    numeric rc = shell_exec(\"curl -s https://example.com > /tmp/melp_web_out\")\n    string html = mlp_fs_read_to_string(\"/tmp/melp_web_out\")\n    println(\"Ilk 200 karakter:\")\n    println(substring(html; 0; 200))\n    rc = shell_exec(\"rm -f /tmp/melp_web_out\")\nend function\n"},
    {title:"09 — Kullanicidan Girdi", code:"-- Ornek 9: Kullanicidan Girdi (stdin)\nfunction main()\n    println(\"Adiniz nedir?\")\n    string isim = mlp_stdin_read()\n    if len(isim) > 0 then\n        println(\"Merhaba, \" & isim & \"!\")\n    else\n        println(\"Girdi alinamadi\")\n    end if\nend function\n"},
    {title:"10 — Dosya Listeleme", code:"-- Ornek 10: Dizi Taklidi (shell_exec + ls)\nfunction main()\n    println(\"Dosyalariniz:\")\n    numeric rc = shell_exec(\"ls -1 /tmp > /tmp/melp_ls_out\")\n    string listing = mlp_fs_read_to_string(\"/tmp/melp_ls_out\")\n    println(listing)\n    rc = shell_exec(\"rm -f /tmp/melp_ls_out\")\nend function\n"}
];

function initExamples(){
    exampleSelect.innerHTML = '<option value="">📚 Ornekler ('+examples.length+')</option>';
    examples.forEach((ex,i)=>{
        exampleSelect.innerHTML += '<option value="'+i+'">'+ex.title+'</option>';
    });
}

editor.addEventListener('keydown',function(e){
    if(e.key==='Tab'){e.preventDefault();const s=this.selectionStart;const en=this.selectionEnd;this.value=this.value.substring(0,s)+'    '+this.value.substring(en);this.selectionStart=this.selectionEnd=s+4}
    if(e.key==='Enter'&&e.ctrlKey){e.preventDefault();runCode()}
});
editor.addEventListener('input',()=>{lineCount.textContent=editor.value.split('\n').length+' satir'});

function loadExample(){
    const i=exampleSelect.value;if(i==='')return;
    editor.value=examples[i].code;lineCount.textContent=editor.value.split('\n').length+' satir';clearOutput();
}
function clearOutput(){output.innerHTML='';status.textContent=''}
function appendOutput(text,cls){const s=document.createElement('span');s.className=cls||'';s.textContent=text;output.appendChild(s);output.scrollTop=output.scrollHeight}

// ── WASM Worker ──
function initWorker(){
    try{
        worker = new Worker('compiler-worker.js');
        worker.onmessage = function(e){
            const msg = e.data;
            switch(msg.type){
                case 'worker-ready':
                    workerReady = true;
                    status.textContent = 'hazir ✓';
                    btnRun.disabled = false;
                    break;
                case 'compile-start':
                    status.textContent = 'derleniyor...';
                    break;
                case 'compile-success':
                    status.textContent = 'calisiyor...';
                    break;
                case 'compile-error':
                    appendOutput(msg.stderr+'\n','error');
                    status.textContent = 'hata ✗';
                    btnRun.disabled = false;
                    btnRun.textContent = '▶ Calistir';
                    break;
                case 'run-stdout':
                    appendOutput(msg.stdout,'success');
                    break;
                case 'run-stderr':
                    appendOutput(msg.stderr,'error');
                    break;
                case 'run-exit':
                    if(msg.exitCode===0) status.textContent = 'tamam ✓';
                    else status.textContent = 'cikis '+msg.exitCode;
                    btnRun.disabled = false;
                    btnRun.textContent = '▶ Calistir';
                    break;
                case 'run-cancel':
                    appendOutput('[iptal edildi]\n','warn');
                    btnRun.disabled = false;
                    btnRun.textContent = '▶ Calistir';
                    break;
            }
        };
        worker.onerror = function(e){
            workerReady = false;
            status.textContent = 'worker hatasi';
            btnRun.disabled = false;
            btnRun.textContent = '▶ Calistir';
        };
        status.textContent = 'yukleniyor...';
        btnRun.disabled = true;
    }catch(e){
        status.textContent = 'wasm yok';
        btnRun.disabled = false;
    }
}

function runCode(){
    const code = editor.value;
    if(!code.trim()) return;

    if(!workerReady){
        appendOutput('⚠️  WASM derleyici henuz hazir degil. Lutfen bekleyin...\n','warn');
        return;
    }

    btnRun.disabled = true;
    btnRun.textContent = '⏳';
    output.innerHTML = '';
    worker.postMessage({ type: 'compile', code: code, run: true });
}

initExamples();
initWorker();
lineCount.textContent = editor.value.split('\n').length+' satir';
</script>
</body>
</html>
